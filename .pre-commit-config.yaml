repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-toml

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types:
          - json
          - yaml

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        additional_dependencies: [toml]

  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black

  - repo: https://github.com/asottile/blacken-docs
    rev: 1.18.0
    hooks:
      - id: blacken-docs
        additional_dependencies: [black==24.8.0]
        args: [-l, "79", -t, py312]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8

  - repo: local
    hooks:
      - id: rspdocs-validate-config
        name: Validate bundled rspdocs config (roster, page-excludes, tokens)
        entry: rspdocs-validate-config
        language: system
        pass_filenames: false
        files: ^src/rspdocs/(discovery/environments\.json|sphinxext/page_excludes\.yaml)$
      - id: rspdocs-lint-paths
        name: Lint doc paths (lowercase, hyphen-separated; no .DS_Store)
        entry: rspdocs-lint-paths
        language: system
        pass_filenames: false
