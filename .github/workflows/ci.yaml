name: CI

env:
  PYTHON_VERSION: "3.12"

"on":
  push:
    branches-ignore:
      # These should always correspond to pull requests, so ignore them for
      # the push trigger and let them be triggered by the pull_request
      # trigger, avoiding running the workflow twice.  This is a minor
      # optimization so there's no need to ensure this is comprehensive.
      - "dependabot/**"
      - "renovate/**"
      - "tickets/**"
      - "u/**"
    tags:
      - "*"
  pull_request: {}
  merge_group: {}
  schedule:
    # Weekly rebuild so the published sites pick up fresh Repertoire
    # service-discovery data (fetched at build time) without needing a commit
    # to land. Rubin deploys on Patch Thursdays, with all updates in place by
    # 3:15 pm US Pacific. GitHub cron is UTC-only, so 23:15 UTC Thursday is
    # 3:15 pm PST (winter) and 4:15 pm PDT (summer) — never earlier than the
    # end of the update window in either season. Scheduled events always run
    # on the default branch (main), so the upload-all job's refs/heads/main
    # guard is satisfied.
    - cron: "15 23 * * 4"
  # On-demand rebuild. When dispatched on the main ref this runs the full
  # build + serialized LTD upload path (see the upload-all job's condition);
  # dispatched on any other ref it builds but does not publish.
  workflow_dispatch: {}

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Install the package so the rspdocs-validate-config console script (used
      # by the local pre-commit hook) resolves on PATH.
      - name: Install package
        run: pip install -e .

      - name: Run pre-commit hooks
        uses: j178/prek-action@v2

  testextensions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tox
        uses: lsst-sqre/run-tox@v1
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          tox-envs: "py,typing"

  # Advisory prose linting with Vale (https://vale.sh). This job is
  # deliberately non-blocking: vale-action runs reviewdog with
  # fail_on_error: false and filter_mode: added, so findings surface as
  # inline annotations on changed lines only and the job stays green even
  # when Vale reports issues. See docs/contributing/vale.rst.
  vale:
    runs-on: ubuntu-latest
    # Annotations are only meaningful on pull requests (reviewdog needs a diff).
    if: ${{ github.event_name == 'pull_request' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Vale shells out to rst2html (docutils) to parse reStructuredText.
      - name: Install docutils
        run: pip install docutils

      - name: Run Vale
        uses: errata-ai/vale-action@v2
        # Vale is advisory: annotations should appear on the PR, but the
        # check must stay green. fail_on_error alone isn't enough — the
        # action still fails the step when reviewdog exits nonzero (for
        # example when a prose-heavy PR overflows GitHub's per-step
        # annotation cap), so tolerate any step failure outright.
        continue-on-error: true
        with:
          # vale-action runs `vale sync` to download the Google package.
          # The default reporter (github-pr-annotations) works with the
          # read-only GITHUB_TOKEN on forked PRs, unlike github-pr-check.
          fail_on_error: false
          filter_mode: added
          files: docs

  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        rsp:
          - "base"
          - "idfdev"
          - "idfint"
          - "idfprod"
          - "summit"
          - "tucson-teststand"
          - "usdfdev"
          - "usdfprod"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for rediraffe

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Run tox
        uses: lsst-sqre/run-tox@v1
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          tox-envs: "sphinx-${{ matrix.rsp }},linkcheck-${{ matrix.rsp }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rsp }}
          path: _build/html/${{ matrix.rsp }}/
          if-no-files-found: error

  # For ticket branch previews of the primary environment's docs
  upload-for-branch:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ (github.event_name == 'pull_request') && startsWith(github.head_ref, 'tickets/') }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: idfprod
          path: _build/html/idfprod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upload to LSST the Docs
        uses: lsst-sqre/ltd-upload@v1
        with:
          project: "rsp"
          dir: "_build/html/idfprod"
          username: ${{ secrets.LTD_USERNAME }}
          password: ${{ secrets.LTD_PASSWORD }}

  # For merges to main — and scheduled or manually dispatched rebuilds on the
  # main ref — run an upload for all environments. The refs/heads/main guard
  # is required: `schedule` always runs on the default branch (so it passes),
  # but `workflow_dispatch` can be invoked on any branch, and we must not
  # publish from a ticket branch.
  upload-all:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main') }}

    strategy:
      # Serialize LTD uploads: only one environment uploads to LSST the Docs
      # at a time. The builds themselves run in parallel in the `build` job;
      # here we consume those artifacts one at a time so concurrent uploads
      # can never race against each other. `max-parallel: 1` queues the matrix
      # jobs sequentially within this workflow run without skipping or
      # cancelling any of them. `fail-fast: false` ensures a failed upload for
      # one environment does not cancel the pending uploads for the others.
      fail-fast: false
      max-parallel: 1
      matrix:
        rsp:
          - "base"
          - "idfdev"
          - "idfint"
          - "idfprod"
          - "summit"
          - "tucson-teststand"
          - "usdfdev"
          - "usdfprod"

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.rsp }}
          path: _build/html/${{ matrix.rsp }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upload primary
        if: ${{ matrix.rsp == 'idfprod' }}
        uses: lsst-sqre/ltd-upload@v1
        with:
          project: "rsp"
          dir: "_build/html/${{ matrix.rsp }}"
          username: ${{ secrets.LTD_USERNAME }}
          password: ${{ secrets.LTD_PASSWORD }}

      # Don't use the ltd-upload action because we ned to override the "git-ref"
      # as the environment name.
      - name: Upload non-primary
        if: ${{ matrix.rsp != 'idfprod' }}
        env:
          LTD_PASSWORD: ${{ secrets.LTD_PASSWORD }}
          LTD_USERNAME: ${{ secrets.LTD_USERNAME }}
        run: |
          pip install ltd-conveyor
          ltd upload --dir _build/html/${{ matrix.rsp }} --product rsp --git-ref ${{ matrix.rsp }}

      - name: Report status
        if: always()
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }}
          notify_when: "failure"
          notification_title: "LTD upload for `${{ matrix.rsp }}` in {repo} failed"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK }}
