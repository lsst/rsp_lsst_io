# A regularly running workflow to validate that builds are working.

name: Periodic CI

env:
  PYTHON_VERSION: "3.12"

"on":
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Install the package so the rspdocs-validate-config console script (used
      # by the local pre-commit hook) resolves on PATH.
      - name: Install package
        run: pip install -e .

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

      - name: Report status
        if: always()
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }}
          notify_when: "failure"
          notification_title: "Periodic job `lint` for {repo} failed"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK }}

  testextensions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tox
        uses: lsst-sqre/run-tox@v1
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          tox-envs: "py,typing"

      - name: Report status
        if: always()
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }}
          notify_when: "failure"
          notification_title: "Periodic job `testextensions` for {repo} failed"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK }}

  # Advisory full-corpus Vale report. Non-blocking: it always succeeds and
  # uploads the report as an artifact for review. It does not affect the
  # build matrix or the Slack notifications. See docs/contributing/vale.rst.
  vale-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Vale (PyPI) ships the binary; docutils supplies rst2html for RST.
      - name: Install Vale and docutils
        run: pip install vale docutils

      - name: Sync Vale packages
        run: vale sync

      # Run over the whole included corpus and capture the report. The path
      # exclusions in .vale.ini (updates, inbox drafts, roadmap) still apply;
      # `|| true` keeps the step green even though Vale exits non-zero when it
      # has findings.
      - name: Run Vale over the full corpus
        run: vale docs/ | tee vale-report.txt || true

      - uses: actions/upload-artifact@v4
        with:
          name: vale-report
          path: vale-report.txt
          if-no-files-found: warn

  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        rsp:
          - "base"
          - "idfdev"
          - "idfint"
          - "idfprod"
          - "summit"
          - "tucson-teststand"
          - "usdfdev"
          - "usdfprod"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for rediraffe

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Run tox
        uses: lsst-sqre/run-tox@v1
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          tox-envs: "sphinx-${{ matrix.rsp }},linkcheck-${{ matrix.rsp }}"

      - name: Report status
        if: always()
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }}
          notify_when: "failure"
          notification_title: "Periodic job `build` for {repo} failed"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK }}
