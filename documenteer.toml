[project]
title = "Rubin Science Platform"
copyright = "2018–2025 Association of Universities for Research in Astronomy, Inc. (AURA)"
base_url = "https://rsp.lsst.io"
github_url = "https://github.com/lsst/rsp_lsst_io"
version = "Current"

[sphinx]
extensions = ["sphinx_jinja", "sphinxcontrib.youtube"]
# Generate the lsst.rsp automodapi stub pages alongside their reference page
# rather than in the default top-level docs/api/ directory.
python_api_dir = "guides/notebooks/lsst.rsp/api"
nitpick_ignore_regex = [
    # pyvo classes are referenced by bare (unqualified) name in lsst.rsp
    # docstrings and type annotations; pyvo's object inventory only carries the
    # fully-qualified names, so these can't be cross-referenced.
    ["py:.*", "AsyncTAPJob"],
    ["py:.*", "DatalinkResults"],
    ["py:.*", "SIA2Service"],
    ["py:.*", "TAPService"],
    # Typo in an upstream lsst.rsp docstring (should be RSPDiscovery).
    ["py:obj", "RESPDiscovery"],
    # typing.Union is a py:class in CPython's object inventory but is referenced
    # as py:data by the type-hint renderer.
    ["py:data", "typing\\.Union"],
    # logging.Filterer is an undocumented internal base class, absent from
    # CPython's object inventory.
    ["py:class", "logging\\.Filterer"],
]

[sphinx.intersphinx.projects]
python = "https://docs.python.org/3/"
astropy = "https://docs.astropy.org/en/stable/"
numpy = "https://numpy.org/doc/stable/"
pandas = "https://pandas.pydata.org/docs/"
pyvo = "https://pyvo.readthedocs.io/en/latest/"
requests = "https://requests.readthedocs.io/en/latest/"

[sphinx.linkcheck]
ignore = [
    'https://rsp.lsst.io',
    'https://github.com/lsst-rsp/rsp_lsst_io',
    'https://base-lsp.lsst.codes',
    'https://data-dev.lsst.cloud',
    'https://data-int.lsst.cloud',
    'https://data.lsst.cloud',
    'https://id.lsst.cloud',  # COmanage identity portal; blocks the link checker (403)
    'https://summit-lsp.lsst.codes',
    'https://tucson-teststand.lsst.codes',
    'https://usdf-rsp-dev.slac.stanford.edu',
    'https://usdf-rsp.slac.stanford.edu',
    'https://docushare.lsst.org',
    'https://www.java.com/en/',  # Not accessible to the link checker
    'https://ui.adsabs.harvard.edu/abs/2022SPIE12189E..11J/abstract',
    'https://www.star.bris.ac.uk/~mbt/topcat/', # MLG added; frequently times out
    'http://www.star.bris.ac.uk/~mbt/topcat/', # MLG added; frequently times out
    'http://www.star.bris.ac.uk/~mbt/topcat/sun253/sun253.html#SyntheticColumnQueryWindow', # MLG added; frequently times out
    'https://www.lsst.org/scientists/international-drh-list', # MLG added; was timing out
    # Slack app_redirect deep-links require an authenticated session and always
    # return HTTP 403 to the anonymous link checker.
    'https://slack\.com/app_redirect.*',
    # Slack workspace archive links redirect to a sign-in/workspace-switch page
    # that the anonymous link checker can't follow.
    'https://lsstc\.slack\.com/.*',
    # GitHub's "new issue" form redirects anonymous requests to a login page;
    # the deep link is correct for signed-in users but can't be checked here.
    'https://github\.com/lsst/rsp_lsst_io/issues/new',
]
